name: NeuralOS Hybrid Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-train:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.10

    - name: Install dependencies
      run: pip install tensorflow

    - name: Retrain Global Model
      run: python cloud/retrain.py

    - name: Export TFLite
      run: python cloud/export_tflite.py

    - name: Upload Model Artifact
      uses: actions/upload-artifact@v3
      with:
        name: neural-model
        path: model.tflite

    - name: Build Android APK
      run: ./gradlew assembleRelease- name: Generate Score-Based Tag
      run: python score_tag.py

    - name: Read Tag
      id: read_tag
      run: echo "TAG_NAME=$(cat tag_name.txt)" >> $GITHUB_ENV

    - name: Create Git Tag
      run: |
        git config user.name "NeuralOS Bot"
        git config user.email "bot@neuralos.ai"
        git tag $TAG_NAME
        git push origin $TAG_NAME

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ env.TAG_NAME }}
        body_path: CHANGELOG_AUTO.md